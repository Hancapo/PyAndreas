[PyAndreas]
# Enables the built-in F10 Python console and development test commands.
# It can also be changed from Pause Menu > Options > PyAndreas.
DeveloperMode = 0

# Transparency of the console code/history surface (0.0-1.0).
ConsoleBackgroundOpacity = 0.69

# These can also be changed from the console's SETTINGS page.
ConsoleScale = 1.00
ConsoleHistoryLimit = 100
ConsoleAutoComplete = 1

# Optional TrueType monospace override. Defaults to Windows Consolas.
# ConsoleFont = C:\Windows\Fonts\consola.ttf
# ConsoleFontFace = Consolas
